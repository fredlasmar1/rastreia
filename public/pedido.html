<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rastreia - Pedido</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="nav">
  <a href="/dashboard.html" class="nav-logo"><img src="/img/logo-recobro.jpg" alt="Recobro"><div><div class="nav-brand">RASTREIA</div></div></a>
  <div class="nav-links">
    <a href="/dashboard.html">Dashboard</a>
    <a href="/novo-pedido.html">+ Novo Pedido</a>
    <a href="/restricoes.html">🚦 Restrições no CPF</a>
    <a href="/clientes.html">Clientes</a>
    <a href="#" onclick="logout()">Sair</a>
  </div>
  <div class="nav-user" id="nav-user"></div>
</nav>

<div class="container" style="max-width:800px">
  <div id="conteudo">
    <div class="loading"><div class="spinner"></div>Carregando pedido...</div>
  </div>
</div>

<script>
  const token = localStorage.getItem('rastreia_token');
  if (!token) window.location.href = '/';
  const usuario = JSON.parse(localStorage.getItem('rastreia_usuario') || '{}');
  document.getElementById('nav-user').textContent = usuario.nome || '';

  const id = new URLSearchParams(window.location.search).get('id');
  if (!id) window.location.href = '/dashboard.html';

  const TIPOS = {
    dossie_pf: 'Dossiê Pessoa Física', dossie_pj: 'Dossiê Pessoa Jurídica',
    due_diligence: 'Due Diligence Empresarial', due_diligence_imobiliaria: 'Due Diligence Imobiliária',
    analise_devedor: 'Análise de Devedor', investigacao_patrimonial: 'Investigação Patrimonial',
    consulta_veicular: 'Consulta Veicular'
  };

  const STATUS_IA_LABEL = {
    pendente: { txt: 'Pendente', cor: '#ea580c', bg: '#fef3c7' },
    concluida: { txt: 'Concluída', cor: '#065f46', bg: '#dcfce7' },
    falhou: { txt: 'Falhou', cor: '#dc2626', bg: '#fee2e2' },
    desabilitada: { txt: 'Desabilitada', cor: '#6b7280', bg: '#f3f4f6' },
    aguardando_extracao: { txt: 'Aguardando IA', cor: '#1e3a8a', bg: '#dbeafe' },
    cpf_ilegivel: { txt: 'CPF ilegível', cor: '#92400e', bg: '#fef3c7' }
  };

  const STATUS_LABEL = {
    aguardando_pagamento: 'Aguardando Pagamento', pago: 'Pago',
    em_andamento: 'Em Andamento', concluido: 'Concluído', cancelado: 'Cancelado'
  };

  async function api(url, opts = {}) {
    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' }, ...opts });
    if (res.status === 401) { logout(); return null; }
    return res.json();
  }

  function esc(str) { if (!str) return ''; const d = document.createElement('div'); d.textContent = String(str); return d.innerHTML; }

  let pedidoAtual;
  // Trava em memória: enquanto /consultar está em voo, não deixamos o operador
  // disparar /concluir (causava PDF gerado antes das APIs terminarem).
  let consultasEmAndamento = false;

  async function carregar() {
    const data = await api(`/api/pedidos/${id}`);
    if (!data || data.erro) { document.getElementById('conteudo').innerHTML = '<div class="alert alert-error">Pedido não encontrado</div>'; return; }
    pedidoAtual = data;
    renderizar(data);
    if (usuario.perfil === 'admin' || usuario.perfil === 'operador') carregarCusto(data);
    if (usuario.perfil === 'admin') carregarCustoAdmin(data);
  }

  async function carregarCustoAdmin(p) {
    const el = document.getElementById('custo-admin-conteudo');
    if (!el) return;
    try {
      const res = await fetch(`/api/admin/custos/produtos/${encodeURIComponent(p.tipo)}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (!res.ok) { el.textContent = 'Produto sem catálogo de custos.'; return; }
      const d = await res.json();
      const linhas = (d.detalhes || []).map(x => `
        <div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px;border-bottom:1px solid #fde68a">
          <span>${esc(x.rotulo || x.api)}</span>
          <span style="font-variant-numeric:tabular-nums">R$ ${Number(x.preco).toFixed(2).replace('.', ',')}</span>
        </div>`).join('');
      el.innerHTML = `
        <div>Custo bruto estimado: <strong>R$ ${d.custoBruto.toFixed(2).replace('.', ',')}</strong></div>
        <div>Margem: <strong>R$ ${d.margem.toFixed(2).replace('.', ',')} (${d.margemPct.toFixed(1)}%)</strong></div>
        <details style="margin-top:8px"><summary style="cursor:pointer;font-size:12px">APIs consumidas (${d.detalhes.length})</summary><div style="margin-top:6px">${linhas}</div></details>
      `;
    } catch (e) {
      el.textContent = 'Erro ao carregar custo de catálogo.';
    }
  }

  function renderizar(p) {
    const prazoOk = p.prazo_entrega ? new Date(p.prazo_entrega) > new Date() : true;
    const prazoLabel = p.prazo_entrega ? new Date(p.prazo_entrega).toLocaleString('pt-BR') : '-';
    const dados = p.dados || [];

    const receitaFederal = dados.find(d => d.fonte === 'receita_federal')?.dados;
    const processos = dados.find(d => d.fonte === 'processos')?.dados;
    const serasa = dados.find(d => d.fonte === 'serasa')?.dados;

    document.getElementById('conteudo').innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
        <a href="/dashboard.html" class="btn btn-outline btn-sm">← Voltar</a>
        <h1 class="page-title" style="margin:0">Pedido #${p.numero}</h1>
        <span class="badge badge-${p.status === 'concluido' ? 'concluido' : p.status === 'em_andamento' ? 'andamento' : p.status === 'pago' ? 'pago' : 'aguardando'}">${STATUS_LABEL[p.status]}</span>
      </div>

      <div id="alerta"></div>

      <!-- AÇÕES -->
      <div class="acoes-bar">
        ${p.status === 'aguardando_pagamento' && p.mp_init_point ? `<a href="${esc(p.mp_init_point)}" target="_blank" class="btn btn-success">💳 Pagar Agora — R$ ${Number(p.valor).toLocaleString('pt-BR', {minimumFractionDigits:2})}</a>` : ''}
        ${p.status === 'aguardando_pagamento' ? `<button class="btn btn-outline" onclick="marcarPago()">✅ Confirmar Pagamento Manual</button>` : ''}
        ${p.status === 'pago' ? `<button class="btn btn-primary" onclick="iniciar()">▶ Iniciar Análise</button>` : ''}
        ${p.status === 'em_andamento' ? `
          <button class="btn btn-warning" onclick="executarConsultas()" id="btn-consultar">🔍 Executar Consultas Automáticas</button>
          <button class="btn btn-success" onclick="mostrarFinalizacao()">📄 Gerar Relatório e Concluir</button>
        ` : ''}
        ${p.status === 'concluido' && p.relatorio_url ? `<a href="${p.relatorio_url}" target="_blank" class="btn btn-primary">📄 Baixar Relatório PDF</a>` : ''}
      </div>

      <!-- DADOS DO PEDIDO -->
      <div class="pedido-section">
        <div class="section-title">Dados do Pedido</div>
        <div class="info-row"><span class="info-label">Tipo</span><span class="info-valor">${TIPOS[p.tipo] || p.tipo}</span></div>
        <div class="info-row"><span class="info-label">Valor</span><span class="info-valor" style="color:#16a34a;font-weight:700">R$ ${Number(p.valor).toLocaleString('pt-BR', {minimumFractionDigits:2})}</span></div>
        <div class="info-row"><span class="info-label">Prazo</span><span class="info-valor" style="color:${prazoOk ? '#111' : '#dc2626'}">${prazoLabel}</span></div>
        <div class="info-row"><span class="info-label">Criado em</span><span class="info-valor">${new Date(p.criado_em).toLocaleString('pt-BR')}</span></div>
        ${p.operador_nome ? `<div class="info-row"><span class="info-label">Operador</span><span class="info-valor">${p.operador_nome}</span></div>` : ''}
      </div>

      <!-- CUSTO BRUTO (INTERNO — admin/operador) -->
      ${(usuario.perfil === 'admin' || usuario.perfil === 'operador') ? `
        <div class="pedido-section" id="secao-custo" style="border:1px dashed #d1d5db;background:#fafafa">
          <div class="section-title" style="display:flex;align-items:center;justify-content:space-between">
            <span>Custo Bruto (interno)</span>
            <a href="/custos-api.html" style="font-size:11px;color:#6b7280;text-decoration:none">editar tabela →</a>
          </div>
          <div style="font-size:11px;color:#6b7280;margin-bottom:8px;font-style:italic">Referência para negociação. Não aparece no PDF do cliente.</div>
          <div id="custo-conteudo">Calculando...</div>
        </div>
      ` : ''}

      <!-- CUSTO BRUTO DE CATÁLOGO (admin only — referência fixa da spec) -->
      ${usuario.perfil === 'admin' ? `
        <div class="pedido-section custo-admin-box" id="secao-custo-admin" style="background:#fef9c3;border:1px solid #facc15;color:#713f12">
          <div class="section-title" style="color:#713f12">💰 Referência de Custo (catálogo)</div>
          <div style="font-size:11px;color:#854d0e;margin-bottom:8px;font-style:italic">Preços fixos das APIs consumidas por este tipo de produto. Use como base de negociação.</div>
          <div id="custo-admin-conteudo">Carregando...</div>
        </div>
      ` : ''}

      <!-- ALVO -->
      <div class="pedido-section">
        <div class="section-title">Alvo da Consulta</div>
        <div class="info-row"><span class="info-label">Nome</span><span class="info-valor"><strong>${esc(p.alvo_nome)}</strong></span></div>
        <div class="info-row"><span class="info-label">Documento</span><span class="info-valor"><code style="font-size:15px">${esc(p.alvo_documento)}</code></span></div>
        <div class="info-row"><span class="info-label">Tipo</span><span class="info-valor">${p.alvo_tipo === 'PF' ? 'Pessoa Física' : 'Pessoa Jurídica'}</span></div>
      </div>

      <!-- CLIENTE -->
      <div class="pedido-section">
        <div class="section-title">Solicitante</div>
        <div class="info-row"><span class="info-label">Nome</span><span class="info-valor">${esc(p.cliente_nome)}</span></div>
        <div class="info-row"><span class="info-label">WhatsApp</span><span class="info-valor">${esc(p.cliente_whatsapp || '-')}</span></div>
        <div class="info-row"><span class="info-label">Email</span><span class="info-valor">${esc(p.cliente_email || '-')}</span></div>
      </div>

      <!-- RECEITA FEDERAL -->
      ${receitaFederal ? `
        <div class="pedido-section">
          <div class="section-title">🏛 Receita Federal</div>
          ${receitaFederal.erro ? `<div class="alert alert-error">${receitaFederal.erro}</div>` : `
            ${receitaFederal.razao_social ? `<div class="info-row"><span class="info-label">Razão Social</span><span class="info-valor">${esc(receitaFederal.razao_social)}</span></div>` : ''}
            ${receitaFederal.situacao ? `<div class="info-row"><span class="info-label">Situação</span><span class="info-valor">${esc(receitaFederal.situacao)}</span></div>` : ''}
            ${receitaFederal.data_abertura ? `<div class="info-row"><span class="info-label">Abertura</span><span class="info-valor">${esc(receitaFederal.data_abertura)}</span></div>` : ''}
            ${receitaFederal.porte ? `<div class="info-row"><span class="info-label">Porte</span><span class="info-valor">${esc(receitaFederal.porte)}</span></div>` : ''}
            ${receitaFederal.atividade_principal ? `<div class="info-row"><span class="info-label">Atividade</span><span class="info-valor">${esc(receitaFederal.atividade_principal)}</span></div>` : ''}
            ${receitaFederal.endereco ? `<div class="info-row"><span class="info-label">Endereço</span><span class="info-valor">${esc(receitaFederal.endereco)}</span></div>` : ''}
            ${receitaFederal.socios?.length ? `
              <div style="margin-top:10px"><strong style="font-size:12px;color:#6b7280;text-transform:uppercase">Sócios</strong>
              ${receitaFederal.socios.map(s => `<div style="padding:6px 0;font-size:13px;border-bottom:1px solid #f3f4f6">• ${esc(s.nome)} — ${esc(s.qualificacao)}</div>`).join('')}
              </div>` : ''}
          `}
        </div>` : ''}

      <!-- PROCESSOS JUDICIAIS -->
      ${processos ? `
        <div class="pedido-section">
          <div class="section-title">⚖️ Processos Judiciais</div>
          ${processos.erro ? `
            <div class="alert alert-info">${esc(processos.erro)}</div>
          ` : `
            <div style="margin-bottom:12px">
              <strong style="font-size:20px;color:${processos.total === 0 ? '#16a34a' : processos.total < 5 ? '#ea580c' : '#dc2626'}">${processos.total}</strong>
              <span style="color:#6b7280;font-size:13px"> processos encontrados</span>
            </div>
            ${processos.processos?.map(proc => `
              <div style="background:#f9fafb;border-radius:8px;padding:12px;margin-bottom:8px;border-left:3px solid #2563eb">
                <div style="font-weight:700;font-size:13px">${esc(proc.numero)}</div>
                <div style="font-size:12px;color:#6b7280;margin-top:4px">${esc(proc.tribunal)} | ${esc(proc.classe || '')} | ${esc(proc.ultima_movimentacao)}</div>
                <div style="font-size:12px;margin-top:2px">${esc(proc.assunto)}</div>
              </div>`).join('') || ''}
            ${processos.nota ? `<div style="font-size:12px;color:#6b7280;font-style:italic;margin-top:8px">${esc(processos.nota)}</div>` : ''}
          `}
        </div>` : ''}

      <!-- SERASA -->
      ${serasa ? `
        <div class="pedido-section">
          <div class="section-title">📊 Serasa / Protestos</div>
          <div class="alert alert-info">${serasa.nota || 'Verificação manual necessária'}</div>
        </div>` : ''}

      ${renderAnaliseIA(p)}

      <!-- FINALIZAÇÃO -->
      <div id="finalizacao" style="display:none">
        <div class="pedido-section">
          <div class="section-title">📝 Observações do Analista</div>
          <div class="form-group">
            <label>Adicione comentários ao relatório (opcional)</label>
            <textarea id="observacoes" placeholder="Ex: Empresa com 2 ações trabalhistas ativas. CNPJ em situação regular. Recomenda-se cautela...">${p.observacoes || ''}</textarea>
          </div>
          <div style="margin-top:16px;display:flex;gap:10px">
            <button class="btn btn-success" onclick="concluir()" style="flex:1;justify-content:center">
              ✅ Gerar PDF e Concluir Pedido
            </button>
            <button class="btn btn-outline" onclick="document.getElementById('finalizacao').style.display='none'">
              Cancelar
            </button>
          </div>
        </div>
      </div>
    `;
  }

  function renderAnaliseIA(p) {
    if (p.tipo !== 'due_diligence_imobiliaria') return '';
    const status = p.analise_ia_status || 'desabilitada';
    const lbl = STATUS_IA_LABEL[status] || STATUS_IA_LABEL.desabilitada;
    let analise = p.analise_ia;
    if (typeof analise === 'string') { try { analise = JSON.parse(analise); } catch { analise = null; } }
    const corSev = (s) => {
      const k = (s || '').toLowerCase();
      if (k === 'alta') return { bg: '#fee2e2', fg: '#dc2626' };
      if (k === 'media') return { bg: '#fef3c7', fg: '#ea580c' };
      return { bg: '#dcfce7', fg: '#065f46' };
    };
    const rotuloCat = (c) => ({
      proprietarios: 'Proprietários', transmissoes: 'Transmissões', onus: 'Ônus & Gravames',
      endereco: 'Endereço', documento: 'Documentos', outro: 'Outros'
    })[(c || '').toLowerCase()] || 'Outros';

    let alertasHtml = '';
    if (status === 'concluida' && analise && Array.isArray(analise.alertas) && analise.alertas.length) {
      const grupos = {};
      analise.alertas.forEach(a => {
        const k = (a.categoria || 'outro').toLowerCase();
        (grupos[k] = grupos[k] || []).push(a);
      });
      const ordem = ['proprietarios', 'transmissoes', 'onus', 'endereco', 'documento', 'outro'];
      alertasHtml = Object.keys(grupos).sort((a, b) => ordem.indexOf(a) - ordem.indexOf(b)).map(cat => {
        const lista = grupos[cat].map(a => {
          const c = corSev(a.severidade);
          return `<div style="display:flex;gap:10px;padding:10px;background:${c.bg};border-radius:6px;margin-bottom:6px">
            <span style="font-size:10px;font-weight:700;color:${c.fg};text-transform:uppercase;min-width:50px">${esc((a.severidade || '').toUpperCase())}</span>
            <div style="flex:1">
              <div style="font-weight:700;color:${c.fg};font-size:13px">${esc(a.titulo || '-')}</div>
              <div style="color:#374151;font-size:12px;margin-top:2px">${esc(a.descricao || '')}</div>
            </div>
          </div>`;
        }).join('');
        return `<div style="margin-bottom:10px">
          <div style="font-size:11px;color:#6b7280;font-weight:700;text-transform:uppercase;margin-bottom:6px">${esc(rotuloCat(cat))} (${grupos[cat].length})</div>
          ${lista}
        </div>`;
      }).join('');
    }

    const docsHtml = (status === 'concluida' && analise && Array.isArray(analise.documentos_processados) && analise.documentos_processados.length) ?
      `<details style="margin-bottom:10px"><summary style="cursor:pointer;font-size:12px;color:#6b7280">Documentos analisados (${analise.documentos_processados.length})</summary>
        <div style="margin-top:8px">
          ${analise.documentos_processados.map(d => `
            <div style="padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:12px">
              <span style="display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;${d.irrelevante ? 'background:#fef3c7;color:#92400e' : 'background:#dbeafe;color:#1e3a8a'}">${esc(d.tipo || '-')}${d.irrelevante ? ' (não reconhecido)' : ''}</span>
              <strong style="margin-left:6px">${esc(d.filename || '-')}</strong>
              ${d.resumo_curto ? `<span style="color:#6b7280"> · ${esc(d.resumo_curto)}</span>` : ''}
            </div>
          `).join('')}
        </div>
      </details>` : '';

    return `
      <div class="pedido-section" id="secao-analise-ia">
        <div class="section-title" style="display:flex;align-items:center;justify-content:space-between">
          <span>🤖 Análise de Documentos por IA</span>
          <span style="font-size:11px;padding:3px 10px;border-radius:12px;background:${lbl.bg};color:${lbl.cor};font-weight:700">${lbl.txt}</span>
        </div>
        ${status === 'desabilitada' ? `
          <div style="font-size:13px;color:#6b7280">Sem documentos do imóvel anexados a este pedido — a análise por IA não foi executada.</div>
        ` : ''}
        ${status === 'pendente' ? `
          <div style="font-size:13px;color:#6b7280">Análise pendente. Será executada quando as consultas automáticas rodarem.</div>
        ` : ''}
        ${status === 'falhou' ? `
          <div class="alert alert-error" style="margin:0">A análise IA falhou. Verifique se os documentos estão legíveis e tente novamente em "Executar Consultas Automáticas".</div>
        ` : ''}
        ${status === 'aguardando_extracao' ? `
          <div style="background:#dbeafe;border:1px solid #bfdbfe;border-radius:8px;padding:12px;font-size:13px;color:#1e3a8a;line-height:1.5">
            CPF/CNPJ não foi informado — a IA vai tentar extrair os proprietários dos documentos quando você rodar <strong>"Executar Consultas Automáticas"</strong>.
          </div>
        ` : ''}
        ${status === 'cpf_ilegivel' ? renderBannerCpfIlegivel(p) : ''}
        ${status === 'concluida' && analise ? `
          <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px;margin-bottom:12px">
            <div style="font-size:11px;color:#1e3a8a;font-weight:700;text-transform:uppercase;margin-bottom:4px">Resumo executivo</div>
            <div style="font-size:13px;color:#1e3a8a;line-height:1.5">${esc(analise.resumo_executivo || '-')}</div>
          </div>
          ${docsHtml}
          ${alertasHtml ? `<div style="font-size:11px;color:#6b7280;text-transform:uppercase;font-weight:700;margin-bottom:8px">Alertas (${analise.alertas.length})</div>${alertasHtml}` : ''}
          ${(analise.identificacao && (analise.identificacao.matricula_numero || analise.identificacao.endereco_completo)) ? `
            <details style="margin-top:10px">
              <summary style="cursor:pointer;font-size:12px;color:#6b7280">Identificação do imóvel extraída</summary>
              <div style="margin-top:8px;font-size:13px">
                ${analise.identificacao.matricula_numero ? `<div><strong>Matrícula:</strong> ${esc(analise.identificacao.matricula_numero)}</div>` : ''}
                ${analise.identificacao.cartorio ? `<div><strong>Cartório:</strong> ${esc(analise.identificacao.cartorio)}</div>` : ''}
                ${analise.identificacao.endereco_completo ? `<div><strong>Endereço:</strong> ${esc(analise.identificacao.endereco_completo)}</div>` : ''}
                ${analise.identificacao.area_total_m2 ? `<div><strong>Área Total:</strong> ${esc(analise.identificacao.area_total_m2)} m²</div>` : ''}
              </div>
            </details>
          ` : ''}
          ${(Array.isArray(analise.proprietarios) && analise.proprietarios.length) ? `
            <details style="margin-top:6px">
              <summary style="cursor:pointer;font-size:12px;color:#6b7280">Histórico de proprietários (${analise.proprietarios.length})</summary>
              <div style="margin-top:8px">
                ${analise.proprietarios.map(pr => `
                  <div style="padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:13px">
                    <strong>${esc(pr.nome || '-')}</strong>${pr.atual ? ' <span style="color:#16a34a;font-size:11px">[ATUAL]</span>' : ''}
                    ${pr.tipo_aquisicao ? `<span style="color:#6b7280"> · ${esc(pr.tipo_aquisicao)}</span>` : ''}
                    ${pr.data_aquisicao ? `<span style="color:#6b7280"> · ${esc(pr.data_aquisicao)}</span>` : ''}
                  </div>
                `).join('')}
              </div>
            </details>
          ` : ''}
        ` : ''}
      </div>
    `;
  }

  function renderBannerCpfIlegivel(p) {
    const erroMsg = p.erro_processamento || 'A IA não conseguiu identificar CPF/CNPJ legível dos proprietários nos documentos enviados.';
    return `
      <div style="background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:14px;margin:0">
        <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px">
          <span style="font-size:20px">⚠️</span>
          <div style="flex:1">
            <div style="font-weight:700;color:#92400e;font-size:14px;margin-bottom:4px">CPF/CNPJ não identificado nos documentos</div>
            <div style="color:#78350f;font-size:13px;line-height:1.5">${esc(erroMsg)}</div>
          </div>
        </div>
        <div style="background:#fff;border:1px solid #fde68a;border-radius:6px;padding:12px;margin-top:8px">
          <div style="font-size:12px;color:#78350f;font-weight:700;margin-bottom:8px">Informe manualmente o CPF/CNPJ do proprietário:</div>
          <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
            <div style="flex:1;min-width:140px">
              <label style="font-size:11px;color:#6b7280;display:block;margin-bottom:2px">Nome (opcional)</label>
              <input type="text" id="alvo-manual-nome" placeholder="Nome do proprietário" style="width:100%;padding:8px;border:1px solid #e5e7eb;border-radius:6px;font-size:13px">
            </div>
            <div style="flex:1;min-width:140px">
              <label style="font-size:11px;color:#6b7280;display:block;margin-bottom:2px">CPF ou CNPJ *</label>
              <input type="text" id="alvo-manual-doc" placeholder="000.000.000-00" style="width:100%;padding:8px;border:1px solid #e5e7eb;border-radius:6px;font-size:13px">
            </div>
            <button class="btn btn-primary" onclick="adicionarAlvoManual()" style="padding:8px 14px;font-size:13px">Adicionar e reprocessar</button>
          </div>
          <div style="font-size:11px;color:#6b7280;margin-top:8px">Após adicionar, clique em <strong>"Executar Consultas Automáticas"</strong> para rodar as consultas.</div>
        </div>
      </div>
    `;
  }

  async function adicionarAlvoManual() {
    const nome = document.getElementById('alvo-manual-nome').value.trim();
    const documento = document.getElementById('alvo-manual-doc').value.replace(/\D/g, '');
    if (!documento || (documento.length !== 11 && documento.length !== 14)) {
      mostrarAlerta('CPF deve ter 11 dígitos ou CNPJ 14 dígitos', 'error');
      return;
    }
    const data = await api(`/api/pedidos/${id}/alvos`, {
      method: 'POST',
      body: JSON.stringify({ nome, documento })
    });
    if (data?.ok) {
      mostrarAlerta('Alvo adicionado. Clique em "Executar Consultas Automáticas" para reprocessar.', 'success');
      setTimeout(carregar, 1000);
    } else {
      mostrarAlerta('Erro: ' + (data?.erro || 'desconhecido'), 'error');
    }
  }

  async function marcarPago() {
    await api(`/api/pedidos/${id}/pago`, { method: 'PATCH', body: JSON.stringify({ mp_payment_id: 'manual' }) });
    mostrarAlerta('Pagamento confirmado!', 'success');
    setTimeout(carregar, 1000);
  }

  async function iniciar() {
    await api(`/api/pedidos/${id}/iniciar`, { method: 'PATCH', body: '{}' });
    mostrarAlerta('Análise iniciada!', 'success');
    setTimeout(carregar, 1000);
  }

  async function executarConsultas() {
    consultasEmAndamento = true;
    const btnConsultar = document.getElementById('btn-consultar');
    if (btnConsultar) {
      btnConsultar.textContent = '⏳ Consultando... aguarde';
      btnConsultar.disabled = true;
    }
    mostrarAlerta('Executando consultas automáticas nas bases de dados...', 'info');
    try {
      const data = await api(`/api/pedidos/${id}/consultar`, { method: 'POST', body: '{}' });
      if (data?.ok) {
        mostrarAlerta('Consultas concluídas! Verifique os dados abaixo.', 'success');
        setTimeout(carregar, 1500);
      } else if (data?.erro === 'cpf_ilegivel') {
        mostrarAlerta(data.mensagem || 'IA não extraiu CPF dos documentos. Informe manualmente abaixo.', 'error');
        setTimeout(carregar, 800);
      } else {
        mostrarAlerta('Erro nas consultas: ' + (data?.erro || 'Desconhecido'), 'error');
      }
    } finally {
      consultasEmAndamento = false;
    }
  }

  function mostrarFinalizacao() {
    document.getElementById('finalizacao').style.display = 'block';
    document.getElementById('finalizacao').scrollIntoView({ behavior: 'smooth' });
  }

  async function concluir() {
    if (consultasEmAndamento) {
      mostrarAlerta('Aguarde as consultas automáticas terminarem antes de gerar o PDF.', 'error');
      return;
    }
    const observacoes = document.getElementById('observacoes').value;
    mostrarAlerta('Gerando PDF...', 'info');
    const data = await api(`/api/pedidos/${id}/concluir`, { method: 'POST', body: JSON.stringify({ observacoes }) });
    if (data?.ok) {
      mostrarAlerta('✅ Relatório gerado e cliente notificado!', 'success');
      setTimeout(carregar, 1500);
    } else if (data?.erro === 'cpf_ilegivel') {
      mostrarAlerta(data.mensagem || 'CPF ilegível — informe manualmente o alvo antes de concluir.', 'error');
      setTimeout(carregar, 800);
    } else {
      mostrarAlerta('Erro: ' + (data?.erro || 'Desconhecido'), 'error');
    }
  }

  function mostrarAlerta(msg, tipo) {
    const el = document.getElementById('alerta');
    if (el) el.innerHTML = `<div class="alert alert-${tipo}">${esc(msg)}</div>`;
    window.scrollTo(0, 0);
  }

  function logout() { localStorage.clear(); window.location.href = '/'; }

  async function carregarCusto(p) {
    const el = document.getElementById('custo-conteudo');
    if (!el) return;
    try {
      const data = await api(`/api/admin/custos/pedido/${id}`);
      if (!data || data.erro) { el.innerHTML = '<div style="font-size:12px;color:#6b7280">Sem dados de custo</div>'; return; }
      const total = Number(data.total_brl || 0);
      const valor = Number(p.valor || 0);
      const margem = valor > 0 ? ((valor - total) / valor * 100) : 0;
      const lucro = valor - total;
      const breakdown = (data.breakdown || []).map(b => `
        <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid #f3f4f6">
          <span>${esc(b.fonte)} <span style="color:#9ca3af">· ${esc(b.api)}</span></span>
          <span style="font-variant-numeric:tabular-nums">R$ ${Number(b.valor_brl).toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>
        </div>`).join('');
      el.innerHTML = `
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px">
          <div><div style="font-size:10px;color:#6b7280;text-transform:uppercase">Custo APIs</div><div style="font-size:18px;font-weight:700;color:#dc2626">R$ ${total.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>
          <div><div style="font-size:10px;color:#6b7280;text-transform:uppercase">Venda</div><div style="font-size:18px;font-weight:700;color:#111">R$ ${valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>
          <div><div style="font-size:10px;color:#6b7280;text-transform:uppercase">Margem</div><div style="font-size:18px;font-weight:700;color:${margem>=70?'#16a34a':margem>=40?'#ea580c':'#dc2626'}">${margem.toFixed(1)}%</div><div style="font-size:11px;color:#6b7280">Lucro: R$ ${lucro.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>
        </div>
        ${breakdown ? `<details style="margin-top:6px"><summary style="cursor:pointer;font-size:12px;color:#6b7280">Detalhamento (${data.breakdown.length} APIs consultadas)</summary><div style="margin-top:6px">${breakdown}</div></details>` : '<div style="font-size:12px;color:#6b7280">Nenhuma consulta registrada ainda.</div>'}
      `;
    } catch (e) {
      el.innerHTML = '<div style="font-size:12px;color:#dc2626">Erro ao calcular custo</div>';
    }
  }

  carregar();
</script>
</body>
</html>
